<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearSight Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1>ClearSight <span>| Facial Verification Pipeline</span></h1>
            <div class="badge">v1.0.0</div>
        </div>
    </header>

    <div class="container">
        <div class="layout-grid">
            
            <!-- Left Column: Controls -->
            <section class="card config-section">
                <div class="card-header">
                    <h2>Pipeline Configuration</h2>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Target Master Vector Images</label>
                        <div class="file-drop-area">
                            <input type="file" id="ref-images" multiple accept="image/*" class="file-input">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Input CCTV Feed</label>
                        <div class="file-drop-area">
                            <input type="file" id="target-video" accept="video/*" class="file-input">
                        </div>
                    </div>

                    <div class="settings-row">
                        <div class="form-group">
                            <label>Twin Mode</label>
                            <select id="twin-mode" class="custom-select">
                                <option value="false">Disabled (Single)</option>
                                <option value="true">Enabled (Multi)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Camera Quality</label>
                            <select id="video-condition" class="custom-select">
                                <option value="1">Clear / Static</option>
                                <option value="2">Blurry / Shaky</option>
                            </select>
                        </div>
                    </div>

                    <button id="track-btn" class="action-btn">
                        Start Video Processing
                    </button>
                    
                    <div id="loader" class="hidden loading-container">
                        <div class="loader-ring"></div>
                        <span>Processing frames on GPU...</span>
                    </div>
                </div>
            </section>

            <!-- Right Column: Results -->
            <section class="card results-section">
                <div class="card-header">
                    <h2>Live Output</h2>
                </div>
                <div class="card-body hidden" id="results-panel">
                    <div class="video-wrapper">
                        <video id="result-video" controls autoplay loop muted></video>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-label">Detection Time</span>
                            <strong id="time-visible">0.00s</strong>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Frames Tracked</span>
                            <strong id="frames-tracked">0</strong>
                        </div>
                        <div class="stat-box highlight">
                            <span class="stat-label">Confidence</span>
                            <strong id="accuracy-metric">0.00%</strong>
                        </div>
                    </div>
                </div>
                <div class="placeholder-state" id="placeholder">
                    System Idle. Upload files to begin tracking.
                </div>
            </section>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
